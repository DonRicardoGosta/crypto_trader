# Gyökérből: cp .env.example .env
# Indítás (régi frontend konténerek törlése): docker compose down --remove-orphans && docker compose up -d --build --remove-orphans
# Vagy: make docker-up

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: trading
      POSTGRES_DB: trading
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading -d trading || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 40
      start_period: 60s

  redpanda:
    image: redpandadata/redpanda:v24.2.4
    command:
      - redpanda
      - start
      - --mode
      - dev-container
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:19092
      - --smp
      - "1"
      - --memory
      - 512M
      - --overprovisioned
      - --set
      - redpanda.auto_create_topics_enabled=true
    ports:
      - "19092:19092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health 2>&1 | grep -E 'Healthy:.+true' || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 25
      start_period: 40s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 3s

  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://trading:trading@postgres:5432/trading
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        export PYTHONPATH=/app/backend/src
        cd /app/infra/migrations
        echo "Waiting for PostgreSQL..."
        until python -c "import socket;s=socket.socket();s.settimeout(2);s.connect(('postgres',5432));s.close()"; do sleep 2; done
        echo "Running alembic upgrade head..."
        alembic -c /app/infra/migrations/alembic.ini upgrade head
        echo "Migrations complete."
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment: &backend_env
      DATABASE_URL: postgresql+asyncpg://trading:trading@postgres:5432/trading
      KAFKA_BOOTSTRAP: redpanda:9092
      REDIS_URL: redis://redis:6379/0
      SECRETS_MASTER_KEY: ${SECRETS_MASTER_KEY:-dev-master-key-change-in-production-32b}
      WAIT_FOR_POSTGRES: "1"
    command: ["trading-api"]
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped

  realtime-ws:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      <<: *backend_env
    command: ["trading-realtime-ws"]
    ports:
      - "8001:8001"
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  db-writer:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      <<: *backend_env
    command: ["trading-db-writer"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      redpanda:
        condition: service_healthy
    restart: unless-stopped

  engine:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      <<: *backend_env
    command: ["trading-engine"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      api:
        condition: service_started
      redpanda:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8001/realtime}
    ports:
      - "${FRONTEND_HOST_PORT:-5173}:80"
    depends_on:
      - api
      - realtime-ws
    restart: unless-stopped

volumes:
  pgdata:
